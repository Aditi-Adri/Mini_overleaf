services:
  api:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 4000
      CORS_ORIGIN: "*"
    volumes:
      # Per-session .tex/.pdf workspaces survive container restarts, so
      # Tectonic's own multi-pass state and our hash cache both stay warm.
      - workspaces:/app/workspaces
      # Packages beyond the build-time warm set get cached here permanently
      # instead of being re-fetched from the network on every restart.
      - tectonic-cache:/var/cache/tectonic
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  workspaces:
  tectonic-cache:
