services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mini_overleaf}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      # The official minio/minio image is built on ubi9-micro — no shell, so
      # CMD-SHELL tricks (bash, /dev/tcp) won't run. It does bundle a static
      # curl binary though, and MinIO's own documented liveness endpoint —
      # use CMD (direct exec, no shell needed) against that.
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 4000
      CORS_ORIGIN: "*"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mini_overleaf}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-mini-overleaf}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      # Optional — Google sign-in stays disabled (routes just reject with a
      # clear error) until this is set. Must match web's VITE_GOOGLE_CLIENT_ID.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    volumes:
      # Per-project compile workspaces survive container restarts, so
      # Tectonic's own multi-pass state and our project-hash cache stay warm.
      - workspaces:/app/workspaces
      # Packages beyond the build-time warm set get cached here permanently
      # instead of being re-fetched from the network on every restart.
      - tectonic-cache:/var/cache/tectonic
      # Per-project git repos backing version history — unlike the compile
      # workspace this is real user-facing data, not just a cache.
      - version-history:/app/version-history
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  workspaces:
  tectonic-cache:
  version-history:
  postgres-data:
  minio-data:
