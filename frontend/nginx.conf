server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Headroom over the backend's 2mb JSON limit isn't needed here since
    # nginx only forwards the request; the backend enforces the real limit.
    client_max_body_size 2m;

    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 90s;
    }

    location / {
        try_files $uri /index.html;
    }
}
