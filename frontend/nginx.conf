server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Headroom over the backend's 2mb JSON limit isn't needed here since
    # nginx only forwards the request; the backend enforces the real limit.
    client_max_body_size 2m;

    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 90s;
    }

    # Collaboration WebSocket. Long-lived connections, kept alive by a
    # 30s server-side ping (see backend/src/collabServer.ts) — the read
    # timeout here just needs to comfortably exceed that interval.
    location /yjs/ {
        proxy_pass http://api:4000/yjs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Project-wide presence WebSocket — separate room type from /yjs/, same
    # long-lived-connection handling (see backend/src/presenceServer.ts).
    location /presence/ {
        proxy_pass http://api:4000/presence/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri /index.html;
    }
}
